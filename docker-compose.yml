version: '3.8'

services:
  # ─── Backend (NestJS → MySQL en servidor de Alejandro) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adapta_class_backend
    environment:
      # Coolify inyectará estos valores reales. Formato:
      # mysql://g02:PuceProyecto2022!@46.202.177.158:3306/db_grupo02
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "3000:3000"

  # ─── Frontend (React + Vite → nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL pública del backend — Alejandro la configura en Coolify
        VITE_API_URL: ${VITE_API_URL}
    container_name: adapta_class_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
